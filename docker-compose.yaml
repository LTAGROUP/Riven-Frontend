# Full riven-ts + frontend stack.
#
# 1. Copy .env.example to .env and fill in FRONTEND_PASSWORD / AUTH_SECRET /
#    TMDB_READ_ACCESS_TOKEN.
# 2. Create .env.riven with the riven-ts configuration (the frontend's
#    Settings page generates this file for you).
# 3. docker compose up -d
services:
    riven-frontend:
        build: .
        # image: ghcr.io/<you>/riven-frontend:latest
        restart: unless-stopped
        ports:
            - '3001:3000'
        environment:
            - FRONTEND_PASSWORD=${FRONTEND_PASSWORD:?set FRONTEND_PASSWORD in .env}
            - AUTH_SECRET=${AUTH_SECRET:?set AUTH_SECRET in .env}
            - BACKEND_GRAPHQL_URL=http://riven:3000/
            - TMDB_READ_ACCESS_TOKEN=${TMDB_READ_ACCESS_TOKEN:-}
            # IMPORTANT: must match the URL you open in the browser, or form
            # submissions are rejected (SvelteKit CSRF protection).
            - ORIGIN=${ORIGIN:-http://localhost:3001}
        depends_on:
            - riven

    riven:
        image: ghcr.io/rivenmedia/riven-ts:main
        restart: unless-stopped
        env_file: .env.riven
        environment:
            - RIVEN_SETTING__gqlHost=0.0.0.0
            - RIVEN_SETTING__databaseUrl=postgresql://postgres:postgres@riven-db:5432/riven
            - RIVEN_SETTING__redisUrl=redis://riven-cache:6379
            - RIVEN_SETTING__vfsMountPath=/mount
        ports:
            - '3000:3000'
        cap_add:
            - SYS_ADMIN
        devices:
            - /dev/fuse:/dev/fuse
        security_opt:
            - apparmor:unconfined
        volumes:
            - ./logs:/app/logs
            - /mnt/riven:/mount:rshared
        depends_on:
            riven-db:
                condition: service_healthy
            riven-cache:
                condition: service_healthy

    riven-db:
        image: postgres:17-alpine
        restart: unless-stopped
        environment:
            PGDATA: /var/lib/postgresql/data/pgdata
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: riven
        volumes:
            - riven-db:/var/lib/postgresql/data/pgdata
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres']
            interval: 5s
            timeout: 5s
            retries: 10

    riven-cache:
        image: redis:8-alpine
        restart: unless-stopped
        command: redis-server --appendonly yes
        volumes:
            - riven-cache:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    riven-db:
    riven-cache:
