# Frontend-only deployment (the default): for users who ALREADY run riven-ts.
# Updating is: git pull && docker compose up -d --build
#
# Setup (once):
# 1. Copy .env.example to .env and replace FRONTEND_PASSWORD / AUTH_SECRET
#    (plus TMDB_READ_ACCESS_TOKEN and RIVEN_DATABASE_URL — both worth having).
# 2. Tell it where riven-ts is, either:
#    a) same Docker host — find riven's network and put it in .env:
#         docker inspect riven --format '{{range $k,$v := .NetworkSettings.Networks}}{{println $k}}{{end}}'
#         RIVEN_NETWORK=<that network>
#       (BACKEND_GRAPHQL_URL defaults to http://riven:3000/ — override in .env
#       if your container is named differently), or
#    b) reachable over the network — set BACKEND_GRAPHQL_URL to its URL and
#       RIVEN_NETWORK to any existing network (e.g. bridge).
# 3. Set ORIGIN to the exact public HTTPS URL when using a reverse proxy.
# 4. docker compose up -d --build
services:
    riven-frontend:
        build: .
        restart: unless-stopped
        ports:
            - '3001:3000'
        environment:
            - FRONTEND_PASSWORD=${FRONTEND_PASSWORD:?set FRONTEND_PASSWORD in .env}
            - AUTH_SECRET=${AUTH_SECRET:?set AUTH_SECRET in .env}
            - BACKEND_GRAPHQL_URL=${BACKEND_GRAPHQL_URL:-http://riven:3000/}
            # TMDB v4 read token — enables Explore search/trending/detail pages
            - TMDB_READ_ACCESS_TOKEN=${TMDB_READ_ACCESS_TOKEN:-}
            # riven-ts's Postgres (read-mostly): full-library search/pagination
            # and the Database console page.
            # e.g. postgresql://riven:<password>@riven-postgres:5432/riven
            - RIVEN_DATABASE_URL=${RIVEN_DATABASE_URL:-}
            - RIVEN_MANAGEMENT_URL=http://riven-management:3000
            # Must match the URL you open in the browser (or your reverse-proxy
            # public URL), otherwise form submissions fail with 403.
            - ORIGIN=${ORIGIN:-http://localhost:3001}
            # Forwarded client-address headers are intentionally not trusted.
            # The app therefore cannot have its login limiter bypassed by a
            # forged X-Forwarded-For header.
        depends_on:
            - riven-management
        networks:
            - riven-net
            - management

    # A minimal sidecar owns the Docker socket. It exposes no host port and
    # accepts only the two authenticated operations used by the Settings page.
    riven-management:
        build:
            context: .
            dockerfile: management-helper/Dockerfile
        restart: unless-stopped
        read_only: true
        cap_drop:
            - ALL
        pids_limit: 64
        security_opt:
            - no-new-privileges:true
        environment:
            - MANAGEMENT_SECRET=${AUTH_SECRET:?set AUTH_SECRET in .env}
            - RIVEN_CONTAINER_NAME=${RIVEN_CONTAINER_NAME:-riven}
            - RIVEN_REDIS_CONTAINER_NAME=${RIVEN_REDIS_CONTAINER_NAME:-riven-redis}
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        networks:
            - management

networks:
    riven-net:
        external: true
        name: ${RIVEN_NETWORK:?set RIVEN_NETWORK to the docker network riven-ts runs on}
    management:
        internal: true
