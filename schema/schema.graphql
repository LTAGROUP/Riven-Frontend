# Vendored riven-ts GraphQL schema.
#
# Hand-assembled from the riven-ts source (type-graphql resolvers + entities in
# packages/util-plugin-sdk/lib/dto and apps/riven/lib/graphql/resolvers).
# Plugin-provided fields (seerr*, <plugin>IsValid) only exist on a live server
# when the corresponding plugin is enabled — the runtime capability service
# (src/lib/server/capabilities.ts) gates their use.
#
# Refresh against a running backend with: pnpm fetch-schema

scalar DateTimeISO
scalar BigInt
scalar JSONObject

"""
The state of a media item in the processing pipeline
"""
enum MediaItemState {
    unknown
    unreleased
    ongoing
    indexed
    scraped
    downloaded
    completed
    partially_completed
    failed
    paused
}

"""
The current status of a TV show
"""
enum ShowStatus {
    continuing
    upcoming
    ended
    unknown
}

"""
The content rating of a movie (MPAA)
"""
enum MovieContentRating {
    G
    PG
    PG_13
    R
    NC_17
    UNKNOWN
}

"""
The content rating of a TV show (TV Parental Guidelines)
"""
enum ShowContentRating {
    TV_Y
    TV_Y7
    TV_G
    TV_PG
    TV_14
    TV_MA
    UNKNOWN
}

"""
The levels of logging severity
"""
enum LogLevel {
    SILLY
    DEBUG
    VERBOSE
    HTTP
    INFO
    WARN
    ERROR
}

interface MediaItem {
    id: ID!
    title: String!
    fullTitle: String!
    imdbId: String
    posterPath: String
    createdAt: DateTimeISO!
    updatedAt: DateTimeISO
    indexedAt: DateTimeISO!
    scrapedAt: DateTimeISO
    scrapedTimes: Float!
    aliases: JSONObject
    isAnime: Boolean!
    network: String
    country: String
    language: String
    releaseDate: DateTimeISO
    year: Float
    genres: [String!]
    rating: Float
    state: MediaItemState!
    failedScrapeAttempts: Float!
    filesystemEntries: [FileSystemEntry!]!
    subtitles: [SubtitleEntry!]!
    activeStream: Stream
    streams: [Stream!]!
    blacklistedStreams: [BlacklistedStream!]!
    type: String!
    expectedFileCount: Int!
}

interface ShowLikeMediaItem implements MediaItem {
    id: ID!
    title: String!
    fullTitle: String!
    imdbId: String
    posterPath: String
    createdAt: DateTimeISO!
    updatedAt: DateTimeISO
    indexedAt: DateTimeISO!
    scrapedAt: DateTimeISO
    scrapedTimes: Float!
    aliases: JSONObject
    isAnime: Boolean!
    network: String
    country: String
    language: String
    releaseDate: DateTimeISO
    year: Float
    genres: [String!]
    rating: Float
    state: MediaItemState!
    failedScrapeAttempts: Float!
    filesystemEntries: [FileSystemEntry!]!
    subtitles: [SubtitleEntry!]!
    activeStream: Stream
    streams: [Stream!]!
    blacklistedStreams: [BlacklistedStream!]!
    type: String!
    expectedFileCount: Int!
    tvdbId: String!
}

