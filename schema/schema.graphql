union MediaItemUnion = Movie | Show | Season | Episode

type FileSystemEntry {
    id: ID!
    fileSize: BigInt!
    createdAt: DateTimeISO!
    updatedAt: DateTimeISO
    mediaItem: MediaItem!
    type: String!
}

type MediaEntry {
    id: ID!
    fileSize: BigInt!
    createdAt: DateTimeISO!
    updatedAt: DateTimeISO
    mediaItem: MediaItem!
    type: String!
    originalFilename: String!
    downloadUrl: String
    streamPermalink: String
    plugin: String!
    provider: String
    providerDownloadId: String
    libraryProfiles: [String!]
    mediaMetadata: JSONObject
}

type SubtitleEntry {
    id: ID!
    fileSize: BigInt!
    createdAt: DateTimeISO!
    updatedAt: DateTimeISO
    mediaItem: MediaItem!
    type: String!
    language: String!
    content: String!
    fileHash: String!
    sourceProvider: Int!
    sourceId: String
}

union FileSystemEntryUnion = MediaEntry | SubtitleEntry

type Stream {
    infoHash: ID!
    parents: [MediaItem!]!
}

type BlacklistedStream {
    stream: Stream!
    mediaItem: MediaItem!
    provider: String
    plugin: String!
}

type VfsEntryStat {
    mtime: DateTimeISO!
    ctime: DateTimeISO!
    atime: DateTimeISO!
    mode: Int!
    nlink: Int!
    size: BigInt!
    uid: Int!
    gid: Int!
}

type RivenSettings {
    """
    The current version of the application
    """
    version: String!
    """
    The API key for accessing the service
    """
    apiKey: String!
    """
    The logging level for the application
    """
    logLevel: LogLevel!
}

type Settings {
    riven: RivenSettings!
}

input SeerrHandleWebhookInput {
    payload: JSONObject!
}

type Query {
    """
    Fetches a media item by its ID. The returned type will be one of the
    specific media item types (e.g., Movie, Episode) based on the underlying data.
    """
    mediaItemById(id: ID!): MediaItemUnion!
    mediaItems: [MediaItem!]!
    """
    Fetches an episode by its TVDB ID, season number, and episode number.
    If season number is not provided, it will lookup using absolute episode numbering.
    """
    episode(tvdbId: String!, episodeNumber: Int!, seasonNumber: Int): Episode
    settings: Settings!
    vfsEntryStat(path: String!): VfsEntryStat!
    vfsEntry(path: String!): FileSystemEntryUnion
    vfsDirectoryEntryPaths(path: String!): [String!]!

    # ── Plugin-provided (present only when the plugin is enabled) ──────────
    tmdbIsValid: Boolean!
    tvdbIsValid: Boolean!
    seerrIsValid: Boolean!
}

type Mutation {
    resetMediaItem(id: ID!): [MediaItemUnion!]!
    saveStreamUrl(id: ID!, url: String!): MediaEntry!
    """
    Uploads the last 24 hours of logs and returns a share session id.
    """
    shareLogs: String!

    # ── Plugin-provided (present only when the seerr plugin is enabled) ────
    seerrHandleWebhook(input: SeerrHandleWebhookInput!): Boolean!
}
